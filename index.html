<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🍋 Lemon Store</title>

<style>
body{
margin:0;
background:#fff8dc;
font-family:Arial,sans-serif;
padding:15px;
}

header{
background:linear-gradient(135deg,#ffe600,#ffd000);
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,.15);
margin-bottom:20px;
}

header h1{
margin:0;
font-size:35px;
}

header p{
margin:5px 0;
}

.card{
background:white;
border-radius:20px;
padding:15px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,.12);
}

.nome{
font-size:22px;
font-weight:bold;
}

.preco{
color:#ff9800;
font-size:22px;
font-weight:bold;
margin:10px 0;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.comprar{
background:#ffe600;
}

.carrinho{
background:white;
padding:20px;
border-radius:20px;
margin-top:20px;
box-shadow:0 4px 10px rgba(0,0,0,.12);
}

#lista p{
margin:5px 0;
}

.total{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.copiar{
background:#4CAF50;
color:white;
margin-top:10px;
}

.limpar{
background:#f44336;
color:white;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>🍋 Lemon Store</h1>
<p>TikTok: @lemonstoref</p>
<p>Discord: Link na Bio</p>
</header>

<div id="produtos"></div>

<div class="carrinho">
<h2>🛒 Carrinho</h2>

<div id="lista"></div>

<div class="total">
Total: R$ <span id="total">0.00</span>
</div>

<button class="copiar" onclick="copiarCarrinho()">
📋 Copiar Carrinho
</button>

<button class="limpar" onclick="limparCarrinho()">
🗑️ Limpar Carrinho
</button>
</div>

<script>

const marretas = [

["Moonlit Butterflies",0.45],
["Peppermint Bark",0.35],
["Neapolitan",0.50],
["Candy Egg",0.50],

["Frozen Fortress",1.00],
["Choco Dip",1.40],
["Bleak Ink",4.50],
["Unicorn Starlight",0.30],

["Haybale",0.50],
["Forbidden Fortress",0.50],
["Flourished Fountain",1.00],
["Pristine Chocolatery",2.00],

["Spring World",2.50],
["Cranberry Barrel",0.90],
["Dark Mansion",1.50],
["Cesta de Blueberry",4.00],

["Sakura Parasol",3.75],
["Party Balloons",16.00]

];

let itens=[];
let total=0;

const produtos=document.getElementById("produtos");

marretas.forEach(item=>{

produtos.innerHTML += `

<div class="card">

<div class="nome">
🔨 ${item[0]}
</div>

<div class="preco">
R$ ${item[1].toFixed(2)}
</div>

<button class="comprar"
onclick="adicionar('${item[0]}',${item[1]})">

Adicionar ao Carrinho

</button>

</div>

`;

});

function adicionar(nome,preco){

itens.push(nome);
total += preco;

atualizar();

}

function atualizar(){

document.getElementById("lista").innerHTML =
itens.map(i=>`<p>• ${i}</p>`).join("");

document.getElementById("total").innerText =
total.toFixed(2);

}

function limparCarrinho(){

itens=[];
total=0;

atualizar();

}

function copiarCarrinho(){

let texto =
"🍋 PEDIDO LEMON STORE 🍋\n\n";

texto += itens.join("\n");

texto +=
"\n\nTotal: R$ " +
total.toFixed(2);

navigator.clipboard.writeText(texto);

alert("Carrinho copiado!");

}

</script>

</body>
</html>
